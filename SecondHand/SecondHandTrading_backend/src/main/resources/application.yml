spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/secondhandplatform}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

#开启驼峰命名
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

file:
  upload:
    path: D:/upload/images/  # 本地基础存储路径
    access-path: /images/**  # 前端访问路径映射